<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Deeksha! 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght=700&family=Poppins:wght=300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --pink: #ff758c;
            --garden-green: #2d5a27;
            --soft-white: #fffafa;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: #333;
            overflow-x: hidden;
        }

        /* Falling Petals Animation */
        .petal {
            position: fixed;
            top: -10%;
            user-select: none;
            pointer-events: none;
            z-index: 100;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* Floating Hearts Animation */
        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-110vh) scale(1.5);
                opacity: 0;
            }
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: url('https://images.unsplash.com/photo-1523810192022-5a0fb9aa7bc8?auto=format&fit=crop&q=80') center/cover;
            color: white;
            position: relative;
        }

        .hero::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
        }

        .hero-content {
            z-index: 2;
            padding: 20px;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 5rem;
            margin: 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .glass-container {
            max-width: 900px;
            margin: -50px auto 50px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }

        .spotify-box {
            margin: 20px 0;
            border-radius: 12px;
            overflow: hidden;
        }

        .message-text {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #444;
            text-align: center;
            font-style: italic;
            min-height: 200px; /* Prevents layout jumps while typing */
        }

        .btn-celebrate {
            display: block;
            margin: 40px auto 20px;
            background: var(--pink);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn-celebrate:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 117, 140, 0.6);
        }

        footer {
            text-align: center;
            padding: 40px;
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            color: var(--garden-green);
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="hero-content">
            <h1>Happy Birthday DR~🌸!</h1>
            <p style="font-size: 1.5rem;">To my favorite person & biggest blessing ✨</p>
        </div>
    </div>

    <div class="glass-container">
        <div class="spotify-box">
            <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/0Yf9Tgv5f55njDQeuRUnQH?utm_source=generator" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>

        <div class="message-text" id="typewriter"></div>

        <button class="btn-celebrate" onclick="makeItRain()">Click for a Birthday Surprise! 🎊</button>
    </div>

    <footer>
        Always by your side, Bestie! ❤️
    </footer>

    <script>
        const message = `To the strongest, kindest, and most amazing girl I know.\n\nNo matter where life takes us, you'll always be my favorite person and one of the biggest blessings in my life.\n\nThank you for always being there, for making me laugh, supporting me through everything, and creating memories I'll never forget.\n\nYou deserve all the happiness, love, success, and peace this world has to offer.\n\nKeep shining, keep smiling, and keep being the hero of your own story.\n\nMay every dream you have come true, and may this new year of your life be filled with beautiful moments, endless laughter, and unforgettable memories.\n\nStay exactly the way you are because you're truly one of a kind.\n\nWishing you a lifetime of happiness, Bestie! ❤️✨`;

        let i = 0;
        function typeWriter() {
            if (i < message.length) {
                let char = message.charAt(i);
                if (char === "\n") {
                    document.getElementById("typewriter").innerHTML += "<br>";
                } else {
                    document.getElementById("typewriter").innerHTML += char;
                }
                i++;
                setTimeout(typeWriter, 35);
            }
        }

        /* Falling Petals Logic */
        function createPetal() {
            const petal = document.createElement('div');
            petal.innerHTML = '🌸';
            petal.classList.add('petal');
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.fontSize = (Math.random() * 20 + 10) + 'px';
            petal.style.animationDuration = (Math.random() * 3 + 2) + 's';
            petal.style.opacity = Math.random();
            document.body.appendChild(petal);
            setTimeout(() => petal.remove(), 5000);
        }

        /* Floating Hearts Logic */
        function createHeart() {
            const heart = document.createElement("div");
            heart.innerHTML = "❤️";
            heart.style.position = "fixed";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.top = "100vh";
            heart.style.fontSize = (Math.random() * 15 + 15) + "px";
            heart.style.pointerEvents = "none";
            heart.style.animation = "floatUp 5s linear forwards";
            heart.style.zIndex = "99";
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        function makeItRain() {
            confetti({
                particleCount: 200,
                spread: 160,
                origin: { y: 0.6 },
                colors: ['#ff758c', '#ffffff', '#2d5a27']
            });
        }

        // Intervals & Initializers
        setInterval(createHeart, 1200);
        setInterval(createPetal, 400);
        window.onload = typeWriter;
    </script>
</body>
</html>
